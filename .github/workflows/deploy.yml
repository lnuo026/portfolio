name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        run: |
          command_id=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy portfolio from GitHub Actions" \
            --parameters '{"commands":["set -e","cd /home/ubuntu/portfolio","git pull","npm install","npm run build","sudo cp -r dist/* /var/www/lnuo.me/"]}' \
            --query "Command.CommandId" \
            --output text)

          echo "Command sent, ID: $command_id"
          echo "Waiting for command to complete (max 5 minutes)..."

          for i in $(seq 1 30); do
            status=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i/30: $status"

            if [ "$status" = "Success" ] || [ "$status" = "Failed" ] || \
               [ "$status" = "Cancelled" ] || [ "$status" = "TimedOut" ]; then
              break
            fi
            sleep 10
          done

          echo "Deploy status: $status"

          if [ "$status" != "Success" ]; then
            echo "Deployment failed with status: $status"
            echo "❌STDOUT❌"
            aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "StandardOutputContent" --output text
            echo "❌STDERR❌"
            aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "StandardErrorContent" --output text
            exit 1
          fi
